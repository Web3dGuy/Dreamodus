<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

      name="description"

    />
    <meta property="og:title" content="DreaModus Software Inc." />

      property="og:description"
      content="We turn ambitious ideas into reliable software."

    <meta property="og:image" content="/brand/Dreamodus-dark.jpg" />
    <link rel="icon" type="image/jpeg" href="/brand/Dreamodus-dark.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <footer class="landing__footer">

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
